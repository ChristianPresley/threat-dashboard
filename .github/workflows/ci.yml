name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      # VULKAN_SDK is deliberately absent on CI: build.zig only copies the
      # validation layer when the env var exists, and the renderer is not
      # exercised headlessly.
      - name: Build (Debug)
        run: zig build

      - name: Unit tests
        run: zig build test

      # Headless self-test: mock-world determinism, panel data paths,
      # font atlas, layout.ini round-trip — leak-gated (Debug build).
      - name: Selftest
        run: zig-out/bin/threat-dashboard.exe --selftest

      - name: Build (ReleaseSafe)
        run: zig build -Doptimize=ReleaseSafe

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/threat-dashboard | Out-Null
          Copy-Item zig-out/bin/threat-dashboard.exe dist/threat-dashboard/
          Copy-Item -Recurse assets dist/threat-dashboard/assets
          Copy-Item README.md dist/threat-dashboard/
          Compress-Archive -Path dist/threat-dashboard -DestinationPath dist/threat-dashboard-windows-x86_64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: threat-dashboard-windows-x86_64
          path: dist/threat-dashboard-windows-x86_64.zip
          retention-days: 14
